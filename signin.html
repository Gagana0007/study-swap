<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign In | Study Swap</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ===== CSS VARIABLES & RESET ===== */
        :root {
            --primary: #4361ee;
            --primary-dark: #3a56d4;
            --secondary: #7209b7;
            --accent: #f72585;
            --light: #f8f9fa;
            --dark: #212529;
            --gray: #6c757d;
            --success: #28a745;
            --error: #dc3545;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
            --shadow-hover: 0 15px 40px rgba(0, 0, 0, 0.18);
            --radius: 16px;
            --transition: all 0.3s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
            color: var(--dark);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* ===== HEADER ===== */
        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 0;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .navbar {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        
        .logo-icon {
            font-size: 1.8rem;
            color: var(--primary);
        }
        
        .logo-text {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .logo-subtitle {
            font-size: 0.85rem;
            color: var(--gray);
            margin-top: -4px;
            font-weight: 400;
        }
        
        .back-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
        }
        
        .back-link:hover {
            color: var(--secondary);
            transform: translateX(-3px);
        }
        
        /* ===== MAIN CONTENT ===== */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        
        .auth-container {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 480px;
            padding: 45px 40px;
            animation: slideUp 0.4s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 35px;
        }
        
        .auth-header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--dark);
        }
        
        .auth-header p {
            color: var(--gray);
            font-size: 0.95rem;
        }
        
        /* ===== FORM STYLES ===== */
        .form-group {
            margin-bottom: 22px;
            position: relative;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--dark);
            font-size: 0.95rem;
        }
        
        .form-control {
            width: 100%;
            padding: 14px 16px 14px 45px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 1rem;
            transition: var(--transition);
            background: var(--light);
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.15);
        }
        
        .form-icon {
            position: absolute;
            left: 16px;
            top: 42px;
            color: var(--gray);
            font-size: 1.1rem;
            transition: var(--transition);
        }
        
        .form-control:focus + .form-icon,
        .form-group:hover .form-icon {
            color: var(--primary);
        }
        
        .password-toggle {
            position: absolute;
            right: 16px;
            top: 42px;
            background: none;
            border: none;
            color: var(--gray);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 4px;
            transition: var(--transition);
        }
        
        .password-toggle:hover {
            color: var(--primary);
        }
        
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }
        
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--gray);
        }
        
        .remember-me input {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        
        .forgot-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }
        
        .forgot-link:hover {
            color: var(--secondary);
            text-decoration: underline;
        }
        
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(67, 97, 238, 0.4);
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(67, 97, 238, 0.6);
        }
        
        .btn-submit:active {
            transform: translateY(0);
        }
        
        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        
        /* ===== DIVIDER ===== */
        .divider {
            display: flex;
            align-items: center;
            margin: 30px 0;
            color: var(--gray);
            font-size: 0.9rem;
        }
        
        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e1e5e9;
        }
        
        .divider span {
            padding: 0 15px;
        }
        
        /* ===== SOCIAL LOGIN ===== */
        .social-login {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .btn-social {
            flex: 1;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            background: white;
            color: var(--dark);
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.95rem;
        }
        
        .btn-social:hover {
            border-color: var(--primary);
            background: var(--light);
            transform: translateY(-2px);
        }
        
        .btn-social.google:hover {
            border-color: #db4437;
            color: #db4437;
        }
        
        .btn-social.github:hover {
            border-color: #333;
            color: #333;
        }
        
        /* ===== SIGN UP LINK ===== */
        .signup-link {
            text-align: center;
            color: var(--gray);
            font-size: 0.95rem;
        }
        
        .signup-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }
        
        .signup-link a:hover {
            color: var(--secondary);
            text-decoration: underline;
        }
        
        /* ===== ALERT MESSAGES ===== */
        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .alert-error {
            background: #fff5f5;
            color: var(--error);
            border: 1px solid #fed7d7;
        }
        
        .alert-success {
            background: #f0fff4;
            color: var(--success);
            border: 1px solid #c6f6d5;
        }
        
        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            padding: 25px 20px;
            background: rgba(255, 255, 255, 0.9);
            color: var(--gray);
            font-size: 0.9rem;
            border-top: 1px solid #e1e5e9;
        }
        
        footer strong {
            color: var(--dark);
        }
        
        /* ===== RESPONSIVE ===== */
        @media (max-width: 520px) {
            .auth-container {
                padding: 35px 25px;
                margin: 10px;
            }
            
            .navbar {
                padding: 0 20px;
            }
            
            .social-login {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    
    <!-- ===== HEADER ===== -->
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">
                <i class="fas fa-exchange-alt logo-icon"></i>
                <div>
                    <div class="logo-text">Study Swap</div>
                    <div class="logo-subtitle">Tech Skills Exchange</div>
                </div>
            </a>
            <a href="index.html" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
        </nav>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <main>
        <div class="auth-container">
            <div class="auth-header">
                <h1><i class="fas fa-sign-in-alt"></i> Welcome Back!</h1>
                <p>Sign in to continue your learning journey</p>
            </div>
            
            <!-- Alert Messages -->
            <div id="alertBox" class="alert"></div>
            
            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <!-- Email Field -->
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        class="form-control" 
                        placeholder="you@example.com"
                        required
                        autocomplete="email"
                    >
                    <i class="fas fa-envelope form-icon"></i>
                </div>
                
                <!-- Password Field -->
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        class="form-control" 
                        placeholder="••••••••"
                        required
                        minlength="6"
                        autocomplete="current-password"
                    >
                    <i class="fas fa-lock form-icon"></i>
                    <button type="button" class="password-toggle" onclick="togglePassword()">
                        <i class="fas fa-eye" id="toggleIcon"></i>
                    </button>
                </div>
                
                <!-- Form Options -->
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember"> Remember me
                    </label>
                    <a href="#" class="forgot-link" onclick="showAlert('forgot', 'Password reset link sent to your email!')">Forgot Password?</a>
                </div>
                
                <!-- Submit Button -->
                <button type="submit" class="btn-submit" id="submitBtn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>
            
            <!-- Divider -->
            <div class="divider">
                <span>or continue with</span>
            </div>
            
            <!-- Social Login -->
            <div class="social-login">
                <button class="btn-social google" onclick="socialLogin('Google')">
                    <i class="fab fa-google"></i> Google
                </button>
                <button class="btn-social github" onclick="socialLogin('GitHub')">
                    <i class="fab fa-github"></i> GitHub
                </button>
            </div>
            
            <!-- Sign Up Link -->
            <p class="signup-link">
                Don't have an account? <a href="signup.html">Create one here</a>
            </p>
        </div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer>
        <p>
            &copy; 2026 <strong>Study Swap</strong>. Built with ❤️ by 
            <strong>GAGANA A S</strong>, <strong>ANKITHA P N</strong> & <strong>JAHNAVI C D</strong>
        </p>
        <p style="margin-top: 8px; font-size: 0.85rem; opacity: 0.9;">
            <i class="fas fa-shield-alt"></i> Secure Login • Data Encrypted
        </p>
    </footer>

    <!-- ===== JAVASCRIPT ===== -->
    <script>
        // Toggle Password Visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }
        
        // Show Alert Message
        function showAlert(type, message) {
            const alertBox = document.getElementById('alertBox');
            alertBox.textContent = message;
            alertBox.className = 'alert';
            
            if (type === 'error') {
                alertBox.classList.add('alert-error');
            } else if (type === 'success' || type === 'forgot') {
                alertBox.classList.add('alert-success');
            }
            
            alertBox.style.display = 'block';
            
            // Auto-hide after 5 seconds
            setTimeout(() => {
                alertBox.style.display = 'none';
            }, 5000);
        }
        
        // Handle Login Form Submission
        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            
            // Basic validation
            if (!email || !password) {
                showAlert('error', 'Please fill in all fields.');
                return;
            }
            
            if (password.length < 6) {
                showAlert('error', 'Password must be at least 6 characters.');
                return;
            }
            
            // Show loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing In...';
            
            // 🔹 BACKEND INTEGRATION POINT 🔹
            // Replace this with actual API call:
            /*
            fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, remember: document.getElementById('remember').checked })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    showAlert('success', 'Login successful! Redirecting...');
                    setTimeout(() => window.location.href = 'dashboard.html', 1500);
                } else {
                    showAlert('error', data.message || 'Invalid credentials.');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                }
            })
            .catch(err => {
                showAlert('error', 'Server error. Please try again.');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
            });
            */
            
            // 👇 DEMO MODE (Remove when backend is ready) 👇
            setTimeout(() => {
                // Demo: Accept any valid email format + 6+ char password
                if (email.includes('@') && password.length >= 6) {
                    // Create mock user data for demo
                    const userData = {
                        name: email.split('@')[0].replace(/[._]/g, ' ').replace(/\b\w/g, l => l.toUpperCase()),
                        email: email,
                        teach: 'JavaScript, Python',
                        learn: 'React, Node.js',
                        joined: '2026-01-15T00:00:00.000Z'
                    };
                    localStorage.setItem('studySwapCurrentUser', JSON.stringify(userData));
                    
                    showAlert('success', '✅ Login successful! (Demo Mode)');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html'; // Redirect to dashboard
                    }, 1200);
                } else {
                    showAlert('error', '❌ Invalid credentials. Try: user@example.com / password123');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                }
            }, 1000);
        }
        
        // Social Login Handler
        function socialLogin(provider) {
            showAlert('success', `🔗 Connecting to ${provider}...`);
            // Demo: Simulate social login
            setTimeout(() => {
                // Create mock user data for demo
                const userData = {
                    name: `${provider} User`,
                    email: `user@${provider.toLowerCase()}.com`,
                    teach: 'JavaScript, Python',
                    learn: 'React, Node.js',
                    joined: '2026-01-15T00:00:00.000Z'
                };
                localStorage.setItem('studySwapCurrentUser', JSON.stringify(userData));
                
                showAlert('success', `✅ Connected to ${provider}! Redirecting...`);
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1200);
            }, 1500);
        }
        
        // Auto-focus email field on page load
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('email').focus();
        });
    </script>
</body>
</html>
